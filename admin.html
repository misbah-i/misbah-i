<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="media/logo.svg" type="image/svg+xml">
    <title>মিসবাহ - অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        body {
            background-color: #FFF8E7;
            font-family: Arial, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .admin-nav {
            background-color: #064e3b;
            color: #fbbf24;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .admin-nav h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .admin-nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .admin-nav a:hover {
            color: #fbbf24;
        }

        .admin-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .card h2 {
            color: #064e3b;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #fbbf24;
            padding-bottom: 8px;
            font-size: 1.4rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #4b5563;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #064e3b;
            outline: none;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background-color: #064e3b;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background-color: #0c6a51;
            transform: translateY(-2px);
        }

        .btn-gold {
            background-color: #fbbf24;
            color: #064e3b;
        }

        .btn-gold:hover {
            background-color: #f59e0b;
        }

        .btn-danger {
            background-color: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background-color: #b91c1c;
        }

        .item-card {
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .item-card h3 {
            margin-top: 0;
            color: #374151;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .arabic-input {
            direction: rtl;
            font-size: 1.3rem;
            font-family: Georgia, serif;
        }

        .structure-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .structure-list li {
            padding: 10px 15px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .structure-list li:last-child {
            border-bottom: none;
        }

        .structure-list .leaf-list {
            padding-left: 20px;
            list-style: circle;
            color: #6b7280;
            font-size: 0.95rem;
            margin: 5px 0 10px 0;
        }

        .structure-list .leaf-list li {
            padding: 4px 0;
            border: none;
        }
    </style>
</head>
<body>

    <div class="admin-nav">
        <h1>মিসবাহ অ্যাডমিন প্যানেল (Local CMS)</h1>
        <a href="index.html" target="_blank">প্রচ্ছদ দেখুন ↗</a>
    </div>

    <div class="admin-container">
        <div class="dashboard-grid">
            <!-- Left Column: Site Structure & Sub-page creation -->
            <div>
                <div class="card">
                    <h2>নতুন ক্যাটাগরি (Sub-Page)</h2>
                    <form id="subPageForm">
                        <div class="form-group">
                            <label for="subId">ক্যাটাগরি আইডি (ইংরেজি, e.g. history):</label>
                            <input type="text" id="subId" class="form-control" required placeholder="history">
                        </div>
                        <div class="form-group">
                            <label for="subTitle">ক্যাটাগরি নাম (বাংলা, e.g. ইতিহাস):</label>
                            <input type="text" id="subTitle" class="form-control" required placeholder="ইসলামের ইতিহাস">
                        </div>
                        <div class="form-group">
                            <label for="subDesc">ক্যাটাগরি বিবরণ (Tagline, e.g. কুরআন ও হাদীসের দোয়া):</label>
                            <input type="text" id="subDesc" class="form-control" placeholder="কুরআন ও হাদীস থেকে সংকলিত">
                        </div>
                        <div class="form-group">
                            <label for="subHeaderImage">হেডার ব্যাকগ্রাউন্ড ইমেজ (Header Background Image):</label>
                            <select id="subHeaderImage" class="form-control">
                                <option value="">কোনটিই নয় (সবুজ ব্যাকগ্রাউন্ড)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">তৈরি করুন</button>
                    </form>
                </div>

                <div class="card">
                    <h2>বর্তমান সাইট স্ট্রাকচার</h2>
                    <div id="structureContainer">লোডিং...</div>
                </div>
            </div>

            <!-- Right Column: Leaf-page creation -->
            <div class="card">
                <h2>নতুন কন্টেন্ট পেইজ (Leaf-Page) তৈরি</h2>
                <form id="leafPageForm">
                    <div class="form-group">
                        <label for="leafCategory">ক্যাটাগরি নির্বাচন করুন:</label>
                        <select id="leafCategory" class="form-control" required>
                            <option value="">নির্বাচন করুন</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="leafFilename">ফাইলের নাম (ইংরেজি, e.g. doya.html):</label>
                        <input type="text" id="leafFilename" class="form-control" required placeholder="doya.html">
                    </div>
                    <div class="form-group">
                        <label for="leafTitle">পাতার শিরোনাম (e.g. দোয়া):</label>
                        <input type="text" id="leafTitle" class="form-control" required placeholder="দোয়া সমূহ">
                    </div>
                    <div class="form-group">
                        <label for="leafIcon">আইকন (Emoji, e.g. 🤲):</label>
                        <input type="text" id="leafIcon" class="form-control" required placeholder="🤲">
                    </div>
                    <div class="form-group">
                        <label for="leafSectionTitle">সেকশন শিরোনাম (e.g. দোয়া সমূহ:):</label>
                        <input type="text" id="leafSectionTitle" class="form-control" required placeholder="দোয়া সমূহ:">
                    </div>

                    <div id="itemsContainer">
                        <h3>কন্টেন্ট কার্ডস (Cards)</h3>
                        <!-- Dynamic content blocks will be loaded here -->
                    </div>

                    <button type="button" class="btn btn-gold" id="addItemBtn" style="margin-bottom: 20px;">+ নতুন কার্ড/আয়াত যোগ করুন</button>
                    <br>
                    <button type="submit" class="btn" style="width: 100%; padding: 15px;">পাতাটি তৈরি করুন</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let itemIndex = 0;

        function loadStructure() {
            fetch('/api/structure')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('structureContainer');
                    const select = document.getElementById('leafCategory');
                    
                    container.innerHTML = '';
                    select.innerHTML = '<option value="">নির্বাচন করুন</option>';

                    if (!data.categories || data.categories.length === 0) {
                        container.innerHTML = '<p>কোন ক্যাটাগরি পাওয়া যায়নি।</p>';
                        return;
                    }

                    const ul = document.createElement('ul');
                    ul.className = 'structure-list';

                    data.categories.forEach(cat => {
                        // Populate structure
                        const li = document.createElement('li');
                        li.style.borderBottom = '1px solid #e5e7eb';
                        li.style.paddingBottom = '10px';
                        li.innerHTML = `
                            <div><strong>${cat.title}</strong> <small style="color: #6b7280;">(sub/${cat.filename})</small></div>
                            <button class="btn btn-danger" onclick="deleteSubPage('${cat.id}')" style="padding: 4px 8px; font-size: 0.8rem;">মুছুন</button>
                        `;
                        
                        const leafUl = document.createElement('ul');
                        leafUl.className = 'leaf-list';
                        leafUl.style.listStyle = 'none';
                        leafUl.style.paddingLeft = '10px';
                        cat.pages.forEach(p => {
                            const leafLi = document.createElement('li');
                            leafLi.style.display = 'flex';
                            leafLi.style.justifyContent = 'space-between';
                            leafLi.style.alignItems = 'center';
                            leafLi.style.padding = '4px 0';
                            leafLi.style.borderBottom = '1px dashed #e5e7eb';
                            leafLi.innerHTML = `
                                <span>• ${p.title} (${p.filename})</span>
                                <button class="btn btn-danger" onclick="deleteLeafPage('${cat.id}', '${p.filename}')" style="padding: 2px 6px; font-size: 0.7rem; margin-bottom: 2px;">মুছুন</button>
                            `;
                            leafUl.appendChild(leafLi);
                        });

                        const wrapper = document.createElement('div');
                        wrapper.style.marginBottom = '25px';
                        wrapper.style.border = '1px solid #e5e7eb';
                        wrapper.style.borderRadius = '10px';
                        wrapper.style.padding = '15px';
                        wrapper.style.background = '#ffffff';
                        wrapper.appendChild(li);
                        wrapper.appendChild(leafUl);
                        
                        container.appendChild(wrapper);

                        // Populate Category select dropdown
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.title;
                        select.appendChild(option);
                    });
                })
                .catch(err => {
                    console.error("Error loading structure:", err);
                    document.getElementById('structureContainer').innerHTML = 'লোড করা সম্ভব হয়নি।';
                });
        }

        function deleteSubPage(id) {
            if (!confirm(`আপনি কি নিশ্চিত যে আপনি "${id}" ক্যাটাগরি এবং এর ভেতরের সকল কন্টেন্ট পাতা মুছে ফেলতে চান?`)) {
                return;
            }
            fetch('/api/delete-sub-page', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('ক্যাটাগরি সফলভাবে মুছে ফেলা হয়েছে!');
                    loadStructure();
                } else {
                    alert('ভুল হয়েছে: ' + data.error);
                }
            });
        }

        function deleteLeafPage(category, filename) {
            if (!confirm(`আপনি কি নিশ্চিত যে আপনি "${filename}" পাতাটি মুছে ফেলতে চান?`)) {
                return;
            }
            fetch('/api/delete-leaf-page', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category, filename })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('পাতাটি সফলভাবে মুছে ফেলা হয়েছে!');
                    loadStructure();
                } else {
                    alert('ভুল হয়েছে: ' + data.error);
                }
            });
        }

        function addContentCard() {
            itemIndex++;
            const itemsContainer = document.getElementById('itemsContainer');
            
            const card = document.createElement('div');
            card.className = 'item-card';
            card.id = `itemCard_${itemIndex}`;
            card.innerHTML = `
                <h3>কার্ড #${itemIndex}</h3>
                <button type="button" class="btn btn-danger btn-sm remove-btn" onclick="removeItemCard(${itemIndex})">মুছুন</button>
                <div class="form-group">
                    <label>আরবি আয়াত/দোয়া (ঐচ্ছিক):</label>
                    <textarea class="form-control arabic-input" placeholder="رَبَّنَا..."></textarea>
                </div>
                <div class="form-group">
                    <label>ইংরেজি অনুবাদ (ঐচ্ছিক):</label>
                    <textarea class="form-control" placeholder="Our Lord..."></textarea>
                </div>
                <div class="form-group">
                    <label>বাংলা অনুবাদ (ঐচ্ছিক):</label>
                    <textarea class="form-control" placeholder="হে আমাদের প্রতিপালক..."></textarea>
                </div>
                <div class="form-group">
                    <label>সূত্র/রেফারেন্স (ঐচ্ছিক):</label>
                    <input type="text" class="form-control" placeholder="📚 সূরা আল-বাকারাহ - ২০১">
                </div>
            `;
            itemsContainer.appendChild(card);
        }

        function removeItemCard(id) {
            const card = document.getElementById(`itemCard_${id}`);
            if (card) {
                card.remove();
            }
        }

        // Add initial content card
        addContentCard();

        document.getElementById('addItemBtn').addEventListener('click', addContentCard);

        // Sub Page Creation Handler
        document.getElementById('subPageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('subId').value;
            const title = document.getElementById('subTitle').value;
            const description = document.getElementById('subDesc').value;
            const header_image = document.getElementById('subHeaderImage').value;

            fetch('/api/create-sub-page', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, title, description, header_image })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('ক্যাটাগরি সফলভাবে তৈরি করা হয়েছে!');
                    document.getElementById('subPageForm').reset();
                    loadStructure();
                } else {
                    alert('ভুল হয়েছে: ' + data.error);
                }
            });
        });

        // Leaf Page Creation Handler
        document.getElementById('leafPageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const category = document.getElementById('leafCategory').value;
            const filename = document.getElementById('leafFilename').value;
            const title = document.getElementById('leafTitle').value;
            const icon = document.getElementById('leafIcon').value;
            const section_title = document.getElementById('leafSectionTitle').value;

            // Gather items
            const items = [];
            const itemCards = document.querySelectorAll('.item-card');
            itemCards.forEach(card => {
                const arabic = card.querySelector('.arabic-input').value;
                const english = card.querySelectorAll('textarea')[1].value;
                const bangla = card.querySelectorAll('textarea')[2].value;
                const reference = card.querySelector('input').value;

                items.push({ arabic, english, bangla, reference });
            });

            fetch('/api/create-leaf-page', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category, filename, title, icon, section_title, items })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('পাতাটি সফলভাবে তৈরি করা হয়েছে এবং সাইটের লিংকের সাথে যুক্ত করা হয়েছে!');
                    document.getElementById('leafPageForm').reset();
                    document.getElementById('itemsContainer').innerHTML = '<h3>কন্টেন্ট কার্ডস (Cards)</h3>';
                    itemIndex = 0;
                    addContentCard();
                    loadStructure();
                } else {
                    alert('ভুল হয়েছে: ' + data.error);
                }
            });
        });

        function loadMediaFiles() {
            fetch('/api/media')
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('subHeaderImage');
                    select.innerHTML = '<option value="">কোনটিই নয় (সবুজ ব্যাকগ্রাউন্ড)</option>';
                    if (data.files) {
                        data.files.forEach(file => {
                            const option = document.createElement('option');
                            option.value = file;
                            option.textContent = file;
                            select.appendChild(option);
                        });
                    }
                })
                .catch(err => console.error("Error loading media files:", err));
        }

        // Initial Load
        loadStructure();
        loadMediaFiles();
    </script>
</body>
</html>
